    <style>
        /* 視認性優先: ギュッと中央にまとめつつ、上部の余白を削る */
        body {
            padding: 10px;
            /* 最小限の余白 */
            background-color: var(--bg-color);
            min-height: auto;
            /* 全画面引き伸ばしを防止 */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* 上部に寄せる */
        }

        .container {
            max-width: 800px;
            /* 中央にまとまる心地よい幅 */
            width: 100%;
            gap: 15px;
            /* 部品の間隔を半分に */
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            /* 穏やかな影に */
            background: var(--card-bg);
            margin-top: 0;
            /* 最上部に配置 */
        }

        .drop-zone {
            transition: all 0.2s ease;
        }

        .drop-zone.drag-over {
            background-color: rgba(0, 123, 255, 0.1);
        }

        .preview-section {
            position: relative;
            min-height: 200px;
            /* 未解析時の高さを抑制(300px→200px) */
            background: #eef2f7;
            border-radius: 12px;
            overflow: hidden;
            border: 2px dashed var(--primary-color);
            transition: all 0.2s ease;
            margin-bottom: 5px;
            /* 下部との間隔を最小に */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 解析前の黒い背景を打ち消す */
        .preview-section:not(.has-image) .canvas-wrapper {
            background: transparent;
        }

        .preview-section.has-image {
            background: #fff;
            border: 1px solid #ddd;
            min-height: auto;
        }

        .preview-section.has-image .canvas-wrapper {
            background: #000;
        }

        .drag-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            color: var(--primary-color);
            font-size: 1.1em;
            pointer-events: none;
            z-index: 10;
        }

        .preview-section.has-image .drag-guide {
            display: none;
        }

        /* スマートフォン対応 */
        @media (max-width: 768px) {
            .drag-guide {
                display: none;
            }

            .preview-section {
                min-height: 120px;
                /* スマホではさらに低く(150px→120px) */
            }

            .container {
                padding: 15px;
                gap: 10px;
            }
        }

        /* 画面全体のドラッグオーバーレイ */
        .drag-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74, 144, 226, 0.25);
            /* 透明度を下げて柔らかく */
            backdrop-filter: blur(8px);
            /* ぼかしを強めて高級感を */
            z-index: 9999;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .drag-overlay-text {
            color: white;
            font-size: 2.2em;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
            padding: 20px;
        }

        body.drag-active .drag-overlay {
            display: flex;
        }

        /* リンク集の完全なシンプル化 */
        .nav-links {
            margin: 0;
            padding: 10px 0;
            border: none;
            /* 線を削除 */

            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
