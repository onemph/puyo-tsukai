    <script>
        // パフォーマンス最適化: 重いスクリプト（GTM, OpenCV.js）を遅延読み込み
        function loadOptimizedScripts() {
            // Google Tag Manager
            const gtm = document.createElement('script');
            gtm.src = 'https://www.googletagmanager.com/gtag/js?id=G-77QQWR6EV5';
            gtm.async = true;
            document.head.appendChild(gtm);

            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag('js', new Date());
            gtag('config', 'G-77QQWR6EV5');

            // OpenCV.js (10MBの巨大な解析エンジン)
            const opencv = document.createElement('script');
            opencv.src = 'js/opencv.js';
            opencv.async = true;
            opencv.type = 'text/javascript';
            document.body.appendChild(opencv);
        }

        // 初回描画（FCP/LCP）を優先し、ページが落ち着いてから読み込む
        window.addEventListener('load', () => {
            if ('requestIdleCallback' in window) {
                requestIdleCallback(() => setTimeout(loadOptimizedScripts, 500));
            } else {
                setTimeout(loadOptimizedScripts, 1000);
            }
        });
    </script>
