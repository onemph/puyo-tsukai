    <style>
        /* ドラッグ&ドロップ用のスタイル */
        .drop-zone {
            transition: all 0.2s ease;
        }

        .drop-zone.drag-over {
            background-color: rgba(0, 123, 255, 0.1);
        }

        .preview-section {
            position: relative;
            min-height: 300px;
            background: #eef2f7;
            border-radius: 12px;
            overflow: hidden;
            border: 2px dashed var(--primary-color);
            transition: all 0.2s ease;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 解析前の黒い背景を打ち消す */
        .preview-section:not(.has-image) .canvas-wrapper {
            background: transparent;
        }

        .preview-section.has-image {
            background: #fff;
            border: 1px solid #ddd;
            min-height: auto;
        }

        .preview-section.has-image .canvas-wrapper {
            background: #000;
        }

        .drag-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            color: var(--primary-color);
            font-size: 1.1em;
            pointer-events: none;
            z-index: 10;
        }

        .preview-section.has-image .drag-guide {
            display: none;
        }

        /* スマートフォン等のタッチデバイスではドラッグガイドを非表示にする */
        @media (max-width: 768px) {
            .drag-guide {
                display: none;
            }

            .preview-section {
                min-height: 150px;
            }
        }

        /* 画面全体のドラッグオーバーレイ */
        .drag-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74, 144, 226, 0.25);
            /* 透明度を下げて柔らかく */
            backdrop-filter: blur(8px);
            /* ぼかしを強めて高級感を */
            z-index: 9999;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .drag-overlay-text {
            color: white;
            font-size: 2.2em;
            font-weight: bold;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
            padding: 20px;
        }

        body.drag-active .drag-overlay {
            display: flex;
        }
    </style>
